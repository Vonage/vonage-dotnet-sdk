# git-cliff config for the developer-portal per-version files.
# Each release is emitted with a "FILE:" marker line so a tiny demux
# script can split git-cliff's single output stream into one file per version.

[changelog]
header = ""
body = """
{% if version %}\
@@@FILE {{ version | trim_start_matches(pat="v") }}@@@
---
type: changelog
category: server-sdk
platform: dotnet
version: {{ version | trim_start_matches(pat="v") }}
date: {{ timestamp | date(format="%Y-%m-%d") }}
title: Vonage .NET SDK
icon: dotnet-color
metaTitle: Vonage .NET SDK {{ version }} Changelog | Vonage API Documentation
metaDescription: 'Vonage .NET SDK version {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%b %-d, %Y") }}): View release notes, new features, bug fixes, and breaking changes.'
---

# {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/Vonage/vonage-dotnet-sdk/commit/{{ commit.id }}))
{% endfor -%}
{% endfor %}
[Release](https://github.com/Vonage/vonage-dotnet-sdk/releases/tag/{{ version }})
{% if previous.version %}\
[Full changelog](https://github.com/Vonage/vonage-dotnet-sdk/compare/{{ previous.version }}...{{ version }})
{% endif %}\
"""
trim = false
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = []
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^docs", group = "Documentation" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^release", group = "Releases" },
    { message = "^ci", group = "Pipelines" },
    { message = "^Revert", group = "Reverts" },
    { message = "^Merge", group = "Merges" },
    { message = "^upgrade", group = "Dependencies upgrade" },
    { message = "^build", group = "Build updates" },
    { message = ".*", group = "Other", default_scope = "other" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = "v0.1.0-beta.1"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
